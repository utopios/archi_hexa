# Application
spring.application.name=bibliotech-monolithe

# H2 Database (en memoire pour le dev)
spring.datasource.url=jdbc:h2:mem:bibliotech;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Initialisation SQL apres JPA (necessaire avec Spring Boot 3.x + Hibernate DDL auto)
spring.jpa.defer-datasource-initialization=true

# H2 Console (utile pour inspecter la BDD)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mail (desactive pour les tests - evite l'erreur de connexion SMTP)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Logging
logging.level.com.bibliotech=DEBUG
logging.level.org.springframework.web=INFO

# Port
server.port=8080
